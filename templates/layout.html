<!doctype html>
<html lang="en" class="light">
  <head>
    {% block head %}
      <title>{% block title %}{% endblock %} - My Webpage</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
      <script>
        eruda.init()
      </script>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
        rel="stylesheet"
      />

      {% for css in manifest['src/main.ts']['css'] %}
        <link rel="stylesheet" href="/static/dist/{{ css }}" />
      {% endfor %}
      <script type="text/javascript" src="/static/dist/{{ manifest['src/main.ts']['file'] }}" defer></script>
    {% endblock %}
  </head>
  <body>
    <div class="bg-ambient" aria-hidden="true"></div>
    <div class="read-progress" id="readProgress" style="width: 0%"></div>

    <!-- =========================================================
       NAVBAR
  ========================================================= -->
    <nav class="navbar-glass fixed top-0 left-0 right-0 z-50">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
        <!-- Logo -->
        <button onclick="showPage('home')" class="flex items-center gap-2 group">
          <div class="w-7 h-7 rounded-md bg-amber-400 flex items-center justify-center flex-shrink-0">
            <span class="display t-heading text-sm font-bold leading-none" style="color: #0a0b0f">V</span>
          </div>
          <span class="display t-heading text-lg tracking-tight">Verity</span>
        </button>

        <!-- Nav links -->
        <div class="hidden sm:flex items-center gap-0.5">
          <button onclick="showPage('home')" class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium">Home</button>
          <button
            onclick="
              showPage('home');
              setFilter('trending', null);
            "
            class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium"
          >
            Explore
          </button>
          <button onclick="showPage('profile')" class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium">Profile</button>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-2 sm:gap-3">
          <!-- Search -->
          <button
            class="w-8 h-8 flex items-center justify-center rounded-lg t-muted hover:t-text transition-colors"
            style="background: var(--border); border: 1px solid var(--border)"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>

          <!-- Dark/Light toggle -->
          <div class="flex items-center gap-1.5">
            <!-- sun icon -->
            <svg class="w-3.5 h-3.5 t-muted" fill="currentColor" viewBox="0 0 20 20">
              <path
                fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd"
              />
            </svg>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark" aria-label="Toggle theme"></button>
            <!-- moon icon -->
            <svg class="w-3.5 h-3.5 t-muted" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
            </svg>
          </div>

          <!-- Write -->
          <button
            class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium t-muted transition-all duration-200"
            style="border: 1px solid var(--border)"
            onmouseover="
              this.style.borderColor = 'var(--tag-border)';
              this.style.color = 'var(--tag-text)';
            "
            onmouseout="
              this.style.borderColor = 'var(--border)';
              this.style.color = 'var(--text-muted)';
            "
          >
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
              />
            </svg>
            Write
          </button>

          <!-- Avatar -->
          <button onclick="showPage('profile')" class="w-8 h-8 rounded-full overflow-hidden" style="ring: 1px solid var(--border)">
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Mondher&backgroundColor=1e2130" alt="You" class="w-full h-full object-cover" />
          </button>
        </div>
      </div>
    </nav>
    <div id="content" class="page active relative z-10">{% block content %}{% endblock %}</div>

    {% block footer %}
      <footer class="relative z-10 mt-4" style="border-top: 1px solid var(--border)">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <div class="w-5 h-5 rounded bg-amber-400 flex items-center justify-center">
              <span class="display text-xs font-bold leading-none" style="color: #0a0b0f">V</span>
            </div>
            <span class="display t-heading text-sm">Verity</span>
            <span class="t-muted text-xs ml-2">© 2025</span>
          </div>
          <div class="flex items-center gap-5 t-muted text-xs">
            <a href="#" class="hover:t-text transition-colors">About</a>
            <a href="#" class="hover:t-text transition-colors">Guidelines</a>
            <a href="#" class="hover:t-text transition-colors">Privacy</a>
            <a href="#" class="hover:t-text transition-colors">Terms</a>
          </div>
        </div>
      </footer>
    {% endblock %}
  </body>
</html>
